function BuyersListPage({ onSelectBuyerForProperty, initialFullProfileBuyerId, onClearFullProfileBuyerId }) {
  const [view, setView] = useState("tiles");
  const [statusFilter, setStatusFilter] = useState("all");
  const [seqFilter, setSeqFilter] = useState("all"); // all | active_seq | needs_approval | overdue | pending_seq | no_seq
  const [selectedBuyerId, setSelectedBuyerId] = useState(null);
  const [fullProfileBuyerId, setFullProfileBuyerId] = useState(initialFullProfileBuyerId || null);

  // Clear the cross-page nav prop once consumed
  useEffect(() => {
    if (initialFullProfileBuyerId) {
      setFullProfileBuyerId(initialFullProfileBuyerId);
      onClearFullProfileBuyerId?.();
    }
  }, [initialFullProfileBuyerId]);
  const [sortBy, setSortBy] = useState("matches");
  const [sortDir, setSortDir] = useState("desc"); // "asc" | "desc"

  // Cycle sort: key1 asc → desc → key2 asc → desc → key1 asc...
  const cycleSort = (column) => {
    const keys = COLUMN_SORTS[column];
    if (!keys) return;
    const idx = keys.indexOf(sortBy);
    if (idx === -1) { setSortBy(keys[0]); setSortDir("asc"); }
    else if (sortDir === "asc") { setSortDir("desc"); }
    else { const next = (idx + 1) % keys.length; setSortBy(keys[next]); setSortDir("asc"); }
  };

  // Hint label for active column sort
  const sortHint = (column) => {
    const keys = COLUMN_SORTS[column];
    if (!keys || !keys.includes(sortBy)) return null;
    const labels = {
      statusName: "name", statusTime: "time",
      budget: "budget", moveDate: "move",
      viewingsCount: "count", viewingsDate: "date",
      sequencePriority: "urgency",
    };
    return `${labels[sortBy] || ""} ${sortDir === "asc" ? "↑" : "↓"}`;
  };

  const isColumnActive = (column) => {
    const keys = COLUMN_SORTS[column];
    return keys && keys.includes(sortBy);
  };
  const [searchQuery, setSearchQuery] = useState("");
  const [addPanelOpen, setAddPanelOpen] = useState(false);
  const [showIdealProperty, setShowIdealProperty] = useState(true);
  const [buyerOverrides, setBuyerOverrides] = useState({}); // { buyerId: { sequence, approvalStatus, autoEngageIn, ... } }

  // Profile filter state
  const [budgetMin, setBudgetMin] = useState(200000);
  const [budgetMax, setBudgetMax] = useState(2000000);
  const [propertyTypes, setPropertyTypes] = useState(["flat", "terrace", "detached", "semi"]);
  const [selectedFeatures, setSelectedFeatures] = useState([]);

  // Activity filter state — 0 = any time, otherwise max days ago
  const [dateAddedDays, setDateAddedDays] = useState(0);
  const [lastContactedDays, setLastContactedDays] = useState(0);

  // Pre-filter (status + search, before sequence filter) — used to compute live seq counts
  const preFiltered = BUYERS.filter(b => {
    if (statusFilter !== "all" && b.status !== statusFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return b.name.toLowerCase().includes(q) || b.areas.some(a => a.toLowerCase().includes(q)) || b.desired.toLowerCase().includes(q) || b.mustHaves.some(m => m.toLowerCase().includes(q));
    }
    return true;
  });

  // Live sequence counts for dropdown
  const seqCounts = {
    all: preFiltered.length,
    active_seq: preFiltered.filter(b => b.sequence && !b.sequence.suggested).length,
    needs_approval: preFiltered.filter(b => b.approvalStatus === "needs_approval").length,
    overdue: preFiltered.filter(b => b.approvalStatus === "overdue").length,
    pending_seq: preFiltered.filter(b => b.sequence && b.sequence.suggested).length,
    no_seq: preFiltered.filter(b => !b.sequence).length,
  };

  // Helper: check if date string is within N days of today
  const isWithinDays = (dateStr, maxDays) => {
    if (maxDays === 0) return true;
    const diffDays = Math.floor((new Date("2026-04-08") - new Date(dateStr)) / 86400000);
    return diffDays <= maxDays;
  };

  // Apply sequence filter
  let filtered = preFiltered.filter(b => {
    if (seqFilter === "active_seq") return b.sequence && !b.sequence.suggested;
    if (seqFilter === "needs_approval") return b.approvalStatus === "needs_approval";
    if (seqFilter === "overdue") return b.approvalStatus === "overdue";
    if (seqFilter === "pending_seq") return b.sequence && b.sequence.suggested;
    if (seqFilter === "no_seq") return !b.sequence;
    return true;
  });

  // Apply profile filters (budget, property type, features)
  filtered = filtered.filter(b => {
    // Budget filter
    if (b.budget[0] === undefined || b.budget[1] === undefined) return false;
    if (b.budget[1] < budgetMin || b.budget[0] > budgetMax) return false;

    // Property type filter
    if (propertyTypes.length > 0 && propertyTypes.length < 5) {
      if (!propertyTypes.includes(b.propertyType)) return false;
    }

    // Features filter
    if (selectedFeatures.length > 0) {
      const hasMatchingFeature = b.mustHaves.some(f => selectedFeatures.includes(f));
      if (!hasMatchingFeature) return false;
    }

    return true;
  });

  // Apply activity filters (date added, last contacted)
  filtered = filtered.filter(b => {
    // Date added filter
    if (!isWithinDays(b.dateAdded, dateAddedDays)) return false;

    // Last contacted filter — derived from most recent sparkline dot
    if (lastContactedDays > 0 && b.sparkline && b.sparkline.length > 0) {
      const mostRecentDaysAgo = Math.min(...b.sparkline.map(s => s.daysAgo));
      if (mostRecentDaysAgo > lastContactedDays) return false;
    }

    return true;
  });

  // Apply buyer overrides (stop, qualify, send, skip)
  filtered = filtered.map(b => buyerOverrides[b.id] ? { ...b, ...buyerOverrides[b.id] } : b);

  // Sort
  filtered.sort((a, b) => {
    const dir = sortDir === "asc" ? 1 : -1;
    switch (sortBy) {
      case "matches": return (a.topMatches - b.topMatches) * dir;
      case "moveDate": return (a.moveDate || "Z").localeCompare(b.moveDate || "Z") * dir;
      case "lastContact": return (new Date(a.lastContactAt) - new Date(b.lastContactAt)) * dir;
      case "budget": return ((a.budget?.[0] || 0) - (b.budget?.[0] || 0)) * dir;
      case "statusName": return a.status.localeCompare(b.status) * dir;
      case "statusTime": return (new Date(a.lastContactAt) - new Date(b.lastContactAt)) * dir;
      case "viewingsCount": return (a.viewings.total - b.viewings.total) * dir;
      case "viewingsDate": {
        const da = a.viewings.lastDate ? new Date(a.viewings.lastDate) : new Date(0);
        const db = b.viewings.lastDate ? new Date(b.viewings.lastDate) : new Date(0);
        return (da - db) * dir;
      }
      case "sequencePriority": {
        const pa = seqPriority(a), pb = seqPriority(b);
        if (pa !== pb) return (pa - pb) * dir;
        return (engageMinutes(a.autoEngageIn) - engageMinutes(b.autoEngageIn)) * dir;
      }
      default: return (a.topMatches - b.topMatches) * dir;
    }
  });

  const handleSend = (id) => {
    const buyer = filtered.find(b => b.id === id);
    if (!buyer?.sequence) return;
    // Qualify CTA → start qualification in progress
    if (buyer.sequence.type === "qualification" && (buyer.sequence.suggested || buyer.approvalStatus === "needs_approval")) {
      setBuyerOverrides(p => ({ ...p, [id]: { sequence: { type: "qualification", label: "Qualify", step: "Step 1 of 3", suggested: false }, approvalStatus: null, autoEngageIn: "3 hours" } }));
      return;
    }
    // Approve / Send Now → activate the sequence
    setBuyerOverrides(p => ({ ...p, [id]: { sequence: { ...buyer.sequence, suggested: false, step: "Step 1 of 3" }, approvalStatus: null, autoEngageIn: "2 hours" } }));
  };
  const handleSkip = (id) => {
    const buyer = filtered.find(b => b.id === id);
    if (!buyer?.sequence) return;
    const next = NEXT_SEQUENCE[buyer.sequence.type];
    const delay = next?.getDelay?.(buyer.status) || null;
    setBuyerOverrides(p => ({
      ...p,
      [id]: {
        sequence: next ? { type: next.type, label: next.label, step: null, suggested: true } : null,
        approvalStatus: next ? "needs_approval" : null,
        autoEngageIn: delay,
        pendingAction: null,
      }
    }));
  };
  const handleStop = (id) => {
    const buyer = filtered.find(b => b.id === id);
    if (!buyer?.sequence) return;
    const next = NEXT_SEQUENCE[buyer.sequence.type];
    const delay = next?.getDelay?.(buyer.status) || null;
    setBuyerOverrides(p => ({
      ...p,
      [id]: {
        _stoppedSequence: { type: "stopped", label: "Stopped" },
        sequence: next ? { type: next.type, label: next.label, step: null, suggested: true } : null,
        approvalStatus: next ? "needs_approval" : null,
        autoEngageIn: delay,
      }
    }));
  };

  // Full profile view
  const fullProfileBuyer = fullProfileBuyerId ? (() => { const found = BUYERS.find(x => x.id === fullProfileBuyerId); return buyerOverrides[fullProfileBuyerId] ? { ...found, ...buyerOverrides[fullProfileBuyerId] } : found; })() : null;
  if (fullProfileBuyer) {
    return <BuyerFullProfile buyer={fullProfileBuyer} onBack={() => setFullProfileBuyerId(null)} onSend={handleSend} onSkip={handleSkip} onStop={handleStop} />;
  }

  return (
    <>
          {/* Top bar */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: "1px solid #e2e8f0" }}>
            <div>
              <h1 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>Buyers</h1>
              <span style={{ fontSize: 13, color: "#94a3b8" }}>Active buyers across your branch</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <PrimaryBtn onClick={() => setAddPanelOpen(true)} icon={Plus}>Add buyers</PrimaryBtn>
              <button style={{ position: "relative", background: "none", border: "none", cursor: "pointer" }}>
                <Bell style={{ width: 18, height: 18, color: "#94a3b8" }} />
                <div style={{ position: "absolute", top: -4, right: -4, width: 10, height: 10, borderRadius: "50%", backgroundColor: "#4e88f5", border: "2px solid #fff" }} />
              </button>
            </div>
          </div>

          <div style={{ padding: "16px 24px" }}>

            {/* Search + Pending toggle + Sort + View toggle */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              {/* Search */}
              <div style={{ position: "relative", width: 240, flexShrink: 0 }}>
                <Search style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", width: 14, height: 14, color: "#94a3b8" }} />
                <input
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  placeholder="Search by any detail"
                  style={{ width: "100%", padding: "8px 12px 8px 34px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 13, outline: "none", backgroundColor: "#fff", boxSizing: "border-box" }}
                />
              </div>

              {/* Status filter tabs — centered */}
              <div style={{ flex: 1, display: "flex", justifyContent: "center" }}>
                <div style={{ display: "flex", gap: 4, backgroundColor: "#ffffff", borderRadius: 12, padding: 4, boxShadow: "0px 1px 4px 0px rgba(0,0,0,0.05)" }}>
                  <FilterTab active={statusFilter === "all"} onClick={() => setStatusFilter("all")} count={STATUS_COUNTS.all}>All</FilterTab>
                  <FilterTab active={statusFilter === "qualification"} onClick={() => setStatusFilter("qualification")} count={STATUS_COUNTS.qualification}>Qual</FilterTab>
                  <FilterTab active={statusFilter === "active"} onClick={() => setStatusFilter("active")} count={STATUS_COUNTS.active}>Active</FilterTab>
                  <FilterTab active={statusFilter === "cooling"} onClick={() => setStatusFilter("cooling")} count={STATUS_COUNTS.cooling}>Cooling</FilterTab>
                  <FilterTab active={statusFilter === "warming_up"} onClick={() => setStatusFilter("warming_up")} count={STATUS_COUNTS.warming_up}>Warming</FilterTab>
                  <FilterTab active={statusFilter === "gone_cold"} onClick={() => setStatusFilter("gone_cold")} count={STATUS_COUNTS.gone_cold}>Cold</FilterTab>
                </div>
              </div>

              {/* View toggle */}
              <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#94a3b8" }}>
                <span>Tiles</span>
                <button
                  onClick={() => setView(view === "table" ? "tiles" : "table")}
                  style={{
                    width: 44, height: 24, borderRadius: 12, border: "none", cursor: "pointer",
                    backgroundColor: view === "table" ? "#4e88f5" : "#e2e8f0",
                    position: "relative", padding: 0,
                  }}
                >
                  <div style={{
                    width: 18, height: 18, borderRadius: "50%", backgroundColor: "#fff",
                    position: "absolute", top: 3,
                    left: view === "table" ? 23 : 3,
                    transition: "left 0.2s",
                    boxShadow: "0 1px 2px rgba(0,0,0,0.15)",
                  }} />
                </button>
                <span>Table</span>
              </div>
            </div>

            {/* Second row: filters → sort */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              {/* Sequence filter */}
              <SequenceFilterDropdown
                seqFilter={seqFilter}
                setSeqFilter={setSeqFilter}
                seqCounts={seqCounts}
              />

              {/* Profile filter */}
              <ProfileFilterDropdown
                budgetMin={budgetMin}
                setBudgetMin={setBudgetMin}
                budgetMax={budgetMax}
                setBudgetMax={setBudgetMax}
                propertyTypes={propertyTypes}
                setPropertyTypes={setPropertyTypes}
                selectedFeatures={selectedFeatures}
                setSelectedFeatures={setSelectedFeatures}
                allFeatures={Array.from(new Set(BUYERS.flatMap(b => b.mustHaves)))}
              />

              {/* Activity filter */}
              <ActivityFilterDropdown
                dateAddedDays={dateAddedDays}
                setDateAddedDays={setDateAddedDays}
                lastContactedDays={lastContactedDays}
                setLastContactedDays={setLastContactedDays}
              />

              {/* Ideal property toggle */}
              <button
                onClick={() => setShowIdealProperty(!showIdealProperty)}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
                  color: "#475569",
                  background: "none", border: "1px solid #cbd5e1",
                  borderRadius: 8, padding: "5px 12px", cursor: "pointer",
                }}
              >
                <Home style={{ width: 12, height: 12 }} />
                {showIdealProperty ? "Hide" : "Show"}
              </button>

              {/* Sort by — hidden in table view, column headers handle it */}
              {view === "tiles" && (
                <Dropdown
                  label="Sort by"
                  value={sortBy}
                  onChange={(v) => { setSortBy(v); setSortDir("desc"); }}
                  options={[
                    { key: "matches", label: "Matches" },
                    { key: "sequencePriority", label: "Outreach" },
                    { key: "moveDate", label: "Move date" },
                    { key: "lastContact", label: "Last contacted" },
                  ]}
                />
              )}

              {/* Spacer */}
              <div style={{ flex: 1 }} />
            </div>

            {/* ── TABLE VIEW ── */}
            {view === "table" && (
              <Card style={{ ...CARD_STYLES.default, padding: 0, overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr style={{ borderBottom: "1px solid #e2e8f0" }}>
                      <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 12, fontWeight: 600, color: "#64748b" }}>Buyer</th>
                      <SortHeader active={isColumnActive("status")} hint={sortHint("status")} onClick={() => cycleSort("status")}>Status</SortHeader>
                      {showIdealProperty && <SortHeader active={isColumnActive("desired")} hint={sortHint("desired")} onClick={() => cycleSort("desired")}>Desired</SortHeader>}
                      {showIdealProperty && <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 12, fontWeight: 600, color: "#64748b" }}>Must Haves</th>}
                      <SortHeader active={sortBy === "matches"} onClick={() => { if (sortBy === "matches") setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortBy("matches"); setSortDir("desc"); } }}>Matches</SortHeader>
                      <SortHeader active={isColumnActive("viewings")} hint={sortHint("viewings")} onClick={() => cycleSort("viewings")}>Viewings</SortHeader>
                      <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 12, fontWeight: 600, color: "#64748b" }}>Engagement</th>
                      <SortHeader active={isColumnActive("sequence")} hint={sortHint("sequence")} onClick={() => cycleSort("sequence")}>Outreach</SortHeader>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(b => <BuyerRow key={b.id} buyer={b} showIdealProperty={showIdealProperty} onSend={handleSend} onSkip={handleSkip} onCancel={handleStop} onSelectBuyer={setSelectedBuyerId} />)}
                  </tbody>
                </table>
                {filtered.length === 0 && <div style={{ padding: 40, textAlign: "center", fontSize: 14, color: "#94a3b8" }}>No buyers match your filters</div>}
              </Card>
            )}

            {/* ── TILE VIEW ── */}
            {view === "tiles" && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
                {filtered.map(b => <BuyerTile key={b.id} buyer={b} showIdealProperty={showIdealProperty} onSend={handleSend} onSkip={handleSkip} onCancel={handleStop} onSelectBuyer={setSelectedBuyerId} />)}
                {filtered.length === 0 && <div style={{ gridColumn: "1 / -1", padding: 40, textAlign: "center", fontSize: 14, color: "#94a3b8" }}>No buyers match your filters</div>}
              </div>
            )}

            {/* Pagination */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 16, fontSize: 12 }}>
              <span style={{ color: "#94a3b8" }}>Showing 1&ndash;{Math.min(filtered.length, 24)} of {filtered.length} buyers</span>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <button style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12, color: "#94a3b8", backgroundColor: "#fff", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                  <ChevronLeft style={{ width: 12, height: 12 }} /> Previous
                </button>
                <button style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #4e88f5", fontSize: 12, fontWeight: 600, color: "#4e88f5", backgroundColor: "#eff6ff", cursor: "pointer" }}>1</button>
                <button style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12, color: "#64748b", backgroundColor: "#fff", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                  Next <ChevronRight style={{ width: 12, height: 12 }} />
                </button>
              </div>
            </div>

          </div>

      {/* Buyer Detail Panel */}
      <BuyerDetailPanel buyer={selectedBuyerId ? (() => { const found = BUYERS.find(x => x.id === selectedBuyerId); return buyerOverrides[selectedBuyerId] ? { ...found, ...buyerOverrides[selectedBuyerId] } : found; })() : null} open={!!selectedBuyerId} onClose={() => setSelectedBuyerId(null)} onViewFullProfile={(id) => { setSelectedBuyerId(null); setFullProfileBuyerId(id); }} onSend={handleSend} onSkip={handleSkip} onStop={handleStop} />

      {/* Add Buyer Panel */}
      <AddBuyerPanel open={addPanelOpen} onClose={() => setAddPanelOpen(false)} />
    </>
  );
}

/* ══════════════════════════════════════════════
   APP WRAPPER — handles navigation between pages
   ══════════════════════════════════════════════ */
function App() {
  const [activePage, setActivePage] = useState("buyers"); // "buyers" | "properties"
  const [selectedPropertyId, setSelectedPropertyId] = useState(null);
  const [fullProfileBuyerIdFromProperty, setFullProfileBuyerIdFromProperty] = useState(null);

  // Property detail view
  if (selectedPropertyId) {
    const property = PROPERTIES.find(p => p.id === selectedPropertyId);
    if (property) {
      return (
        <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", backgroundColor: "#f2f2f2", color: "#020617", minHeight: "100vh" }}>
          <div style={{ display: "flex" }}>
            <Sidebar activePage="properties" onNavigate={(page) => { setSelectedPropertyId(null); setActivePage(page); }} />
            <div style={{ flex: 1, minWidth: 0, backgroundColor: "#f2f2f2" }}>
              <PropertyDetailPage
                property={property}
                onBack={() => setSelectedPropertyId(null)}
                onNavigateToBuyer={(id) => { setSelectedPropertyId(null); setFullProfileBuyerIdFromProperty(id); setActivePage("buyers"); }}
              />
            </div>
          </div>
        </div>
      );
    }
  }

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", backgroundColor: "#f2f2f2", color: "#020617", minHeight: "100vh" }}>
      <div style={{ display: "flex" }}>
        <Sidebar activePage={activePage} onNavigate={(page) => { setActivePage(page); setSelectedPropertyId(null); }} />
        <div style={{ flex: 1, minWidth: 0, backgroundColor: "#f2f2f2" }}>
          {activePage === "buyers" && <BuyersListPage initialFullProfileBuyerId={fullProfileBuyerIdFromProperty} onClearFullProfileBuyerId={() => setFullProfileBuyerIdFromProperty(null)} />}
          {activePage === "properties" && <PropertiesListPage onSelectProperty={setSelectedPropertyId} />}
        </div>
      </div>
    </div>
  );
}

/* ── Shared Sidebar ── */
const Sidebar = ({ activePage, onNavigate }) => (
  <div style={{ width: 200, minHeight: "100vh", flexShrink: 0, backgroundColor: "#f2f2f2", borderRight: "1px solid #e2e8f0", display: "flex", flexDirection: "column" }}>
    <div style={{ padding: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 24 }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#1e293b"/><path d="M7 7l5 10 5-10" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <span style={{ fontSize: 14, fontWeight: 600 }}>Viewery</span>
      </div>
      <div style={{ fontSize: 12, color: "#94a3b8", display: "flex", alignItems: "center", gap: 4 }}>Islington Branch <ChevronDown style={{ width: 12, height: 12 }} /></div>
    </div>
    <nav style={{ padding: "0 8px", flex: 1 }}>
      {[
        { icon: Home, label: "Properties", key: "properties" },
        { icon: Users, label: "Buyers", key: "buyers" },
      ].map(({ icon: I, label, key }) => {
        const active = key === activePage;
        return (
          <div
            key={label}
            onClick={() => onNavigate(key)}
            style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", marginBottom: 2, borderRadius: 8, fontSize: 14,
              cursor: "pointer",
              ...(active ? { backgroundColor: "#4e88f5", color: "#fff", fontWeight: 500 } : { color: "#64748b" }),
            }}
          >
            <I style={{ width: 16, height: 16 }} />{label}
          </div>
        );
      })}
    </nav>
    <div style={{ padding: "12px 16px", borderTop: "1px solid #e2e8f0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 28, height: 28, borderRadius: "50%", backgroundColor: "#e2e8f0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 500, color: "#475569" }}>CH</div>
        <div style={{ fontSize: 12, color: "#64748b" }}>Charlotte Harrison</div>
      </div>
    </div>
  </div>
);



const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
